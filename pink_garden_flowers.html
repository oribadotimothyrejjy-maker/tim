<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Garden Flowers - TikTok Style Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            overflow: hidden;
        }

        .tiktok-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .video-feed {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .video-slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }

        .video-slide.active {
            opacity: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 5;
            pointer-events: none;
        }

        .video-info {
            position: absolute;
            bottom: 60px;
            left: 20px;
            z-index: 10;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .flower-name {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .flower-description {
            font-size: 1.1em;
            max-width: 400px;
            line-height: 1.5;
        }

        /* Side controls */
        .controls {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            border-color: white;
        }

        /* Action buttons */
        .action-buttons {
            position: fixed;
            right: 20px;
            bottom: 100px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        /* Pagination dots */
        .pagination {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .dot.active {
            background: white;
            width: 30px;
            border-radius: 6px;
        }

        /* Music note animation */
        .music-note {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 30px;
            animation: rotate 2s linear infinite;
            z-index: 15;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(20deg); }
        }

        /* Loading spinner */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            color: white;
            font-size: 18px;
            display: none;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Play/Pause indicator */
        .play-pause-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        @media (max-width: 768px) {
            .flower-name {
                font-size: 1.8em;
            }

            .flower-description {
                font-size: 0.9em;
            }

            .controls, .action-buttons {
                right: 10px;
            }

            .control-btn, .action-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="music-note">🎵</div>

    <div class="tiktok-container">
        <div class="video-feed" id="videoFeed">
            <!-- Video slides will be populated here -->
        </div>
        <div class="play-pause-indicator" id="playPauseIndicator"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="control-btn" id="prevBtn" title="Previous">👆</button>
        <button class="control-btn" id="nextBtn" title="Next">👇</button>
    </div>

    <!-- Action buttons -->
    <div class="action-buttons">
        <button class="action-btn" id="likeBtn" title="Like">❤️</button>
        <button class="action-btn" id="commentBtn" title="Comment">💬</button>
        <button class="action-btn" id="shareBtn" title="Share">↗️</button>
    </div>

    <!-- Pagination dots -->
    <div class="pagination" id="pagination"></div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        Loading...
    </div>

    <script>
        // Video data with example sources and custom framework
        const videosData = [
            {
                name: "Tulip Garden",
                description: "Beautiful pink tulips swaying in the spring breeze",
                emoji: "🌷",
                video: "https://videos.pexels.com/video-files/12346789/12346789-sd_640_360_25fps.mp4", // Example Pexels URL
                duration: "0:30"
            },
            {
                name: "Rose Bloom",
                description: "Delicate pink roses opening at sunrise",
                emoji: "🌹",
                video: "https://videos.pexels.com/video-files/87654321/87654321-sd_640_360_25fps.mp4", // Example Pexels URL
                duration: "0:30"
            },
            {
                name: "Hibiscus Paradise",
                description: "Exotic pink hibiscus flowers in tropical garden",
                emoji: "🌺",
                video: "https://videos.pexels.com/video-files/11111111/11111111-sd_640_360_25fps.mp4", // Example Pexels URL
                duration: "0:30"
            },
            {
                name: "Cherry Blossoms",
                description: "Soft pink cherry blossoms falling gently",
                emoji: "🌸",
                video: "https://videos.pexels.com/video-files/22222222/22222222-sd_640_360_25fps.mp4", // Example Pexels URL
                duration: "0:30"
            },
            {
                name: "Peony Dance",
                description: "Romantic pink peonies in full bloom",
                emoji: "💐",
                video: "https://videos.pexels.com/video-files/33333333/33333333-sd_640_360_25fps.mp4", // Example Pexels URL
                duration: "0:30"
            },
            {
                name: "Zinnia Garden",
                description: "Cheerful pink zinnias dancing in the wind",
                emoji: "🌼",
                video: "https://videos.pexels.com/video-files/44444444/44444444-sd_640_360_25fps.mp4", // Example Pexels URL
                duration: "0:30"
            }
        ];

        const videoFeed = document.getElementById('videoFeed');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pagination = document.getElementById('pagination');
        const likeBtn = document.getElementById('likeBtn');
        const commentBtn = document.getElementById('commentBtn');
        const shareBtn = document.getElementById('shareBtn');
        const playPauseIndicator = document.getElementById('playPauseIndicator');
        const loading = document.getElementById('loading');

        let currentSlide = 0;
        let videos = [];
        let isPlaying = true;

        // Initialize video feed
        function initializeVideoFeed() {
            videosData.forEach((videoData, index) => {
                const slide = document.createElement('div');
                slide.className = `video-slide ${index === 0 ? 'active' : ''}`;
                
                const video = document.createElement('video');
                video.src = videoData.video;
                video.autoplay = index === 0;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;

                const overlay = document.createElement('div');
                overlay.className = 'video-overlay';

                const info = document.createElement('div');
                info.className = 'video-info';
                info.innerHTML = `
                    <div class="flower-name">${videoData.emoji} ${videoData.name}</div>
                    <div class="flower-description">${videoData.description}</div>
                `;

                slide.appendChild(video);
                slide.appendChild(overlay);
                slide.appendChild(info);
                videoFeed.appendChild(slide);
                videos.push(video);
            });

            createPaginationDots();
        }

        // Create pagination dots
        function createPaginationDots() {
            videosData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `dot ${index === 0 ? 'active' : ''}`;
                dot.addEventListener('click', () => goToSlide(index));
                pagination.appendChild(dot);
            });
        }

        function goToSlide(index) {
            currentSlide = index;

            // Update slides
            document.querySelectorAll('.video-slide').forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });

            // Update videos
            videos.forEach((video, i) => {
                if (i === index) {
                    video.play();
                } else {
                    video.pause();
                }
            });

            // Update pagination dots
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function nextSlide() {
            if (currentSlide < videosData.length - 1) {
                goToSlide(currentSlide + 1);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                goToSlide(currentSlide - 1);
            }
        }

        // Event listeners
        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') prevSlide();
            if (e.key === 'ArrowDown') nextSlide();
            if (e.key === ' ') {
                e.preventDefault();
                togglePlayPause();
            }
        });

        // Touch/Swipe navigation
        let touchStartY = 0;
        let touchEndY = 0;

        videoFeed.addEventListener('touchstart', (e) => {
            touchStartY = e.changedTouches[0].screenY;
        });

        videoFeed.addEventListener('touchend', (e) => {
            touchEndY = e.changedTouches[0].screenY;
            if (touchStartY - touchEndY > 50) {
                nextSlide();
            }
            if (touchEndY - touchStartY > 50) {
                prevSlide();
            }
        });

        // Click to play/pause
        videoFeed.addEventListener('click', togglePlayPause);

        function togglePlayPause() {
            const currentVideo = videos[currentSlide];
            if (currentVideo.paused) {
                currentVideo.play();
                playPauseIndicator.textContent = '▶️';
                isPlaying = true;
            } else {
                currentVideo.pause();
                playPauseIndicator.textContent = '⏸️';
                isPlaying = false;
            }
            playPauseIndicator.style.opacity = '1';
            setTimeout(() => {
                playPauseIndicator.style.opacity = '0';
            }, 500);
        }

        // Action buttons
        likeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            likeBtn.style.transform = 'scale(1.3)';
            setTimeout(() => {
                likeBtn.style.transform = 'scale(1)';
            }, 200);
            console.log('Liked:', videosData[currentSlide].name);
        });

        commentBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            alert('Comments feature coming soon!');
        });

        shareBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            alert('Share: ' + videosData[currentSlide].name);
        });

        // Initialize
        initializeVideoFeed();

        // Log instructions
        console.log('%cPink Garden Flowers - TikTok Style Video Feed', 'font-size: 20px; font-weight: bold; color: #ec4899;');
        console.log('%cTo add your own videos, replace the video URLs in the videosData array', 'font-size: 14px; color: #f472b6;');
        console.log('%cExample free video sources: Pexels, Pixabay, Unsplash Videos', 'font-size: 12px; color: #fbcfe8;');
    </script>
</body>
</html>
